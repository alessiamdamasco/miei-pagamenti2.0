<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ally Finance Planner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: linear-gradient(135deg, #d8c4ff, #ffd6ec); padding: 15px; }
        .card { background: #fff; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { background: #fafafa; border-radius: 8px; min-height: 80px; padding: 5px; font-size: 0.7em; }
        .head { text-align: center; font-weight: bold; padding: 5px 0; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #ffb7dd; color: white; border: none; cursor: pointer; font-weight: bold; }
        .topbar { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 10px; }
        .summary-box { background: #fdf0f6; padding: 10px; border-radius: 12px; margin-bottom: 15px; }
        .stats { display: flex; justify-content: space-between; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💜 Ally Finance Planner</h2>
    <div class="topbar">
        <button onclick="changeMonth(-1)">◀</button>
        <div id="title" style="font-weight: bold; min-width: 120px; text-align: center;"></div>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    
    <div class="summary-box">
        <div id="summary" style="font-size: 1.2em; font-weight: bold; text-align: center;"></div>
        <div class="stats">
            <div id="monthly-stats">Mese: 0€</div>
            <div id="yearly-stats">Anno: 0€</div>
        </div>
    </div>
    <div id="calendar" class="calendar"></div>
</div>

<div class="card">
    <h3>Impostazioni & Movimenti</h3>
    <input id="salary" type="number" placeholder="Stipendio mensile (€)">
    <button onclick="saveSalary()">Aggiorna Stipendio</button>
    <hr>
    <input id="desc" placeholder="Descrizione">
    <input id="amount" type="number" placeholder="Importo (€)">
    <input id="date" type="date">
    <select id="kind">
        <option value="expense">Spesa 💸</option>
        <option value="income">Entrata 💰</option>
    </select>
    <select id="freq">
        <option value="single">Isolata</option>
        <option value="monthly">Fissa Mensile</option>
        <option value="yearly">Fissa Annuale</option>
    </select>
    <button onclick="addItem()" style="background: #c4a1ff;">Aggiungi Movimento</button>
    <button onclick="resetData()" style="background: #ffaaaa; margin-top: 20px;">Resetta Tutto</button>
</div>

<script>
    let items = JSON.parse(localStorage.getItem('ally_items') || '[]');
    let salary = parseFloat(localStorage.getItem('salary') || 0);
    let current = new Date();

    function saveSalary() {
        salary = parseFloat(document.getElementById('salary').value) || 0;
        localStorage.setItem('salary', salary);
        render();
    }

    function addItem() {
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const date = document.getElementById('date').value;
        const kind = document.getElementById('kind').value;
        const freq = document.getElementById('freq').value;
        if(!desc || !amount || !date) return alert("Inserisci i dati!");
        items.push({ desc, amount, date, kind, freq });
        localStorage.setItem('ally_items', JSON.stringify(items));
        render();
    }

    function resetData() {
        if(confirm("Sei sicura di voler cancellare tutto?")) {
            localStorage.clear();
            items = [];
            salary = 0;
            render();
        }
    }

    function isVisible(it, y, m, d) {
        let dIt = new Date(it.date);
        if (it.freq === 'single') return dIt.getFullYear() === y && dIt.getMonth() === m && dIt.getDate() === d;
        if (it.freq === 'monthly') return dIt.getDate() === d && (y > dIt.getFullYear() || (y === dIt.getFullYear() && m >= dIt.getMonth()));
        if (it.freq === 'yearly') return dIt.getDate() === d && m === dIt.getMonth() && y >= dIt.getFullYear();
        return false;
    }

    function render() {
        const y = current.getFullYear();
        const m = current.getMonth();
        document.getElementById('title').textContent = current.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
        
        let mExpense = 0, yExpense = 0, totalIncome = salary;

        items.forEach(it => {
            let dIt = new Date(it.date);
            // Calcolo mese corrente
            if((it.freq === 'single' && dIt.getFullYear() === y && dIt.getMonth() === m) || 
               (it.freq === 'monthly' && (y > dIt.getFullYear() || (y === dIt.getFullYear() && m >= dIt.getMonth()))) ||
               (it.freq === 'yearly' && m === dIt.getMonth() && y >= dIt.getFullYear())) {
                if(it.kind === 'expense') mExpense += it.amount;
                else totalIncome += it.amount;
            }
            // Calcolo stima annuale (semplificata)
            if(it.kind === 'expense') {
                if(it.freq === 'single') yExpense += it.amount;
                else if(it.freq === 'monthly') yExpense += (it.amount * 12);
                else if(it.freq === 'yearly') yExpense += it.amount;
            }
        });

        document.getElementById('summary').innerHTML = `Saldo: <span style="color:${(totalIncome - mExpense) >= 0 ? 'green' : 'red'}">${(totalIncome - mExpense).toFixed(2)}€</span>`;
        document.getElementById('monthly-stats').textContent = `Spese mese: ${mExpense.toFixed(2)}€`;
        document.getElementById('yearly-stats').textContent = `Stima annua spese: ${yExpense.toFixed(2)}€`;

        let cal = document.getElementById('calendar');
        cal.innerHTML = '';
        ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'].forEach(x => cal.innerHTML += `<div class="head">${x}</div>`);
        let first = (new Date(y, m, 1).getDay() + 6) % 7;
        let days = new Date(y, m + 1, 0).getDate();
        for(let i = 0; i < first; i++) cal.innerHTML += '<div></div>';
        for(let d = 1; d <= days; d++) {
            let box = `<div class="day"><b>${d}</b>`;
            items.forEach(it => { if(isVisible(it, y, m, d)) box += `<div>${it.kind === 'income' ? '💰' : '💸'} ${it.desc}</div>`; });
            cal.innerHTML += box + '</div>';
        }
    }

    function changeMonth(v) { current.setMonth(current.getMonth() + v); render(); }
    document.getElementById('salary').value = salary;
    render();
</script>
</body>
</html>
